name: Build & Deploy to seohost

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to maciejmarek.com via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST_MM }}
          username: ${{ secrets.FTP_USER_MM }}
          password: ${{ secrets.FTP_PASS_MM }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_DIR_MM }}
